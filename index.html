<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ルーレット</title>
  <style>
    :root {
      --bg:      #fef9f2;
      --bg2:     #ffffff;
      --accent:  #e07808;
      --acc-dk:  #b85f05;
      --red:     #d02818;
      --gold:    #c89800;
      --text:    #1a1008;
      --text2:   #7a6040;
      --border:  #e8d0a8;
      --shadow:  rgba(180,100,10,0.18);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Meiryo","Yu Gothic","Hiragino Sans",sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* Flash & vignette overlays */
    #flashOverlay {
      position: fixed; inset: 0; z-index: 9000;
      pointer-events: none; opacity: 0;
      background: #fff;
    }
    #focusVignette {
      position: fixed; inset: 0; z-index: 48;
      pointer-events: none; opacity: 0;
      transition: opacity 0.5s;
      background: radial-gradient(ellipse 500px 500px at 38% 54%,
        transparent 35%, rgba(0,0,0,0.32) 100%);
    }
    #focusVignette.active { opacity: 1; }

    /* Header */
    header {
      background: var(--accent);
      padding: 18px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 3px 0 var(--acc-dk);
    }
    .title-wrap { display: flex; flex-direction: column; gap: 2px; }
    .title-en {
      font-size: 10px; font-weight: 900; letter-spacing: 0.55em;
      color: rgba(255,255,255,0.7); text-transform: uppercase;
    }
    .title-jp {
      font-size: 28px; font-weight: 900; letter-spacing: 0.1em; color: #fff;
      line-height: 1; text-shadow: 2px 2px 0 var(--acc-dk);
    }
    #playCounter {
      margin-left: auto;
      font-size: 12px; font-weight: 700; letter-spacing: 0.2em;
      color: rgba(255,255,255,0.8);
      background: rgba(0,0,0,0.15);
      padding: 6px 14px;
      border: 1px solid rgba(255,255,255,0.3);
    }

    /* Main layout */
    main {
      display: flex;
      flex: 1;
    }

    /* Wheel section */
    .wheel-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 28px;
      gap: 22px;
      border-right: 2px solid var(--border);
    }

    .wheel-wrapper {
      position: relative;
      display: inline-block;
      transition: transform 0.45s cubic-bezier(0.34,1.2,0.64,1),
                  filter 0.45s ease;
    }
    .wheel-wrapper.pre-stop {
      transform: scale(1.07);
      filter: drop-shadow(0 10px 28px rgba(220,140,10,0.45));
    }

    /* Pointer */
    .pointer-wrap {
      position: absolute;
      top: -6px; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
    }
    .pointer-body {
      width: 0; height: 0;
      border-left: 13px solid transparent;
      border-right: 13px solid transparent;
      border-top: 32px solid var(--red);
      filter: drop-shadow(0 3px 0 #801808);
      transition: transform 0.1s;
    }
    .pointer-body.excited {
      animation: pointerBounce 0.18s ease-in-out infinite;
    }
    @keyframes pointerBounce {
      0%,100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(5px) scale(1.05); }
    }

    /* Canvas */
    #wheelCanvas {
      display: block;
      border-radius: 50%;
    }

    /* Glitch overlay */
    #glitchOverlay {
      position: absolute; inset: 0;
      border-radius: 50%; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; z-index: 6;
      opacity: 0;
      background: radial-gradient(circle,rgba(8,4,2,0.45) 30%,rgba(180,60,10,0.12) 70%,rgba(8,4,2,0.6) 100%);
    }
    #glitchOverlay.active {
      opacity: 1;
      animation: glitchJitter 0.1s steps(1) infinite;
    }
    @keyframes glitchJitter {
      0%   { background-position: 0 0; }
      33%  { background-position: 4px -3px; }
      66%  { background-position: -3px 4px; }
    }
    #wheelCanvas.glitching {
      filter: blur(5px) saturate(3) contrast(1.1);
      transition: filter 0.2s;
    }
    #scrambleText {
      font-size: 56px; font-weight: 900;
      color: #ff6820;
      text-shadow: 0 0 14px #ff6820, 0 0 36px rgba(255,104,32,0.5),
                   3px 3px 0 rgba(0,0,0,0.7);
      letter-spacing: 0.1em; text-align: center;
    }
    #scrambleText.hazure {
      font-size: 40px; color: #ff1a1a;
      text-shadow: 0 0 14px #ff1a1a, 0 0 36px rgba(255,26,26,0.6),
                   2px 2px 0 rgba(0,0,0,0.7);
      letter-spacing: 0.35em;
    }

    /* Spin button */
    #btnSpin {
      background: var(--accent);
      color: #fff;
      border: 2px solid var(--acc-dk);
      border-radius: 4px;
      padding: 15px 58px;
      font-size: 20px; font-weight: 900;
      letter-spacing: 0.2em;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 4px 0 var(--acc-dk), 0 6px 18px var(--shadow);
      transition: transform 0.08s, box-shadow 0.08s;
    }
    #btnSpin:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 0 var(--acc-dk), 0 10px 24px var(--shadow);
    }
    #btnSpin:active:not(:disabled) {
      transform: translateY(3px);
      box-shadow: 0 1px 0 var(--acc-dk), 0 2px 8px var(--shadow);
    }
    #btnSpin:disabled {
      background: #d8c8a8; border-color: #b8a888;
      color: #a89878; box-shadow: 0 2px 0 #b8a888;
      cursor: not-allowed; transform: none;
    }

    /* Status */
    #statusDisplay {
      min-height: 30px; font-size: 15px;
      font-weight: 700; text-align: center;
    }
    .winner-badge {
      display: inline-block;
      background: var(--accent); color: #fff;
      padding: 5px 22px; border-radius: 3px;
      box-shadow: 0 2px 0 var(--acc-dk);
      letter-spacing: 0.12em;
    }
    .status-thinking {
      color: var(--text2); letter-spacing: 0.2em;
      animation: thinkPulse 0.8s ease-in-out infinite;
    }
    @keyframes thinkPulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.4; }
    }

    /* Side panel */
    .side-panel {
      width: 256px; flex-shrink: 0;
      padding: 24px 20px;
      display: flex; flex-direction: column; gap: 18px;
      background: var(--bg2);
    }
    .panel-heading {
      font-size: 10px; font-weight: 900;
      letter-spacing: 0.55em; color: var(--accent);
      text-transform: uppercase;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--accent);
    }
    #nameList {
      display: flex; flex-direction: column; gap: 4px;
      max-height: 400px; overflow-y: auto;
    }
    #nameList::-webkit-scrollbar { width: 3px; }
    #nameList::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .name-chip {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 10px;
      border: 1px solid var(--border);
      border-left: 4px solid transparent;
      background: var(--bg);
      transition: border-color 0.15s, background 0.15s;
    }
    .name-chip:hover { background: #fff3e0; border-color: var(--accent); }
    .chip-num { font-size: 11px; color: var(--text2); font-weight: 700; width: 16px; text-align: right; flex-shrink: 0; }
    .chip-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .chip-name { flex: 1; font-size: 15px; font-weight: 700; }
    .btn-remove {
      background: none; border: 1px solid transparent;
      width: 22px; height: 22px;
      color: var(--text2); cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.15s, border-color 0.15s;
      border-radius: 2px; font-family: inherit; flex-shrink: 0;
    }
    .btn-remove:hover { color: var(--red); border-color: var(--red); }

    .add-form { display: flex; flex-direction: column; gap: 6px; }
    #newName {
      background: var(--bg); border: 1px solid var(--border);
      padding: 9px 12px; color: var(--text);
      font-size: 14px; font-family: inherit;
      outline: none; transition: border-color 0.15s;
      border-radius: 3px;
    }
    #newName::placeholder { color: var(--text2); }
    #newName:focus { border-color: var(--accent); }
    #btnAdd {
      background: none; border: 1px solid var(--border);
      padding: 9px; color: var(--text2);
      font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: inherit; letter-spacing: 0.2em;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      border-radius: 3px;
    }
    #btnAdd:hover { color: var(--accent); border-color: var(--accent); background: #fff3e0; }

    /* Winner overlay */
    #winnerOverlay {
      position: fixed; inset: 0;
      background: rgba(20,10,0,0.75);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; opacity: 0; pointer-events: none;
      transition: opacity 0.4s;
    }
    #winnerOverlay.show { opacity: 1; pointer-events: all; }
    .winner-card {
      background: var(--bg2);
      border: 3px solid var(--accent);
      border-radius: 6px;
      padding: 44px 60px; text-align: center;
      min-width: 300px;
      box-shadow: 0 6px 0 var(--acc-dk), 0 20px 60px rgba(0,0,0,0.4);
      animation: cardPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .winner-card.rare {
      border-color: var(--gold);
      background: linear-gradient(135deg,#fffbe8,#fff);
      box-shadow: 0 6px 0 #806000, 0 20px 60px rgba(0,0,0,0.4),
                  0 0 50px rgba(200,160,0,0.3);
      animation: cardPopRare 0.45s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes cardPop {
      from { transform: scale(0.55); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    @keyframes cardPopRare {
      0%   { transform: scale(0.3) rotate(-8deg); opacity: 0; }
      70%  { transform: scale(1.08) rotate(2deg); opacity: 1; }
      100% { transform: scale(1) rotate(0); }
    }
    .confetti-area {
      position: relative; height: 40px;
      overflow: visible; margin-bottom: 14px;
    }
    .confetti-piece {
      position: absolute; top: 0;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg);      opacity: 1; }
      100% { transform: translateY(110px) rotate(720deg); opacity: 0; }
    }
    .winner-label-sm {
      font-size: 11px; font-weight: 900; letter-spacing: 0.6em;
      color: var(--accent); margin-bottom: 12px;
    }
    .winner-card.rare .winner-label-sm { color: var(--gold); }
    #overlayName {
      font-size: 56px; font-weight: 900;
      color: var(--text); line-height: 1.1;
      margin-bottom: 32px; letter-spacing: 0.05em;
    }
    .rare-badge {
      display: block; font-size: 12px; font-weight: 900;
      letter-spacing: 0.4em; color: var(--gold);
      margin-bottom: 6px;
    }
    #btnClose {
      background: none; border: 2px solid var(--border);
      border-radius: 3px; padding: 10px 40px;
      color: var(--text2); font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: inherit; letter-spacing: 0.2em;
      transition: color 0.15s, border-color 0.15s;
    }
    #btnClose:hover { color: var(--text); border-color: var(--accent); }

    @media (max-width: 680px) {
      main { flex-direction: column; }
      .wheel-section { border-right: none; border-bottom: 2px solid var(--border); }
      .side-panel { width: 100%; }
      #wheelCanvas { width: 300px !important; height: 300px !important; }
    }
  </style>
</head>
<body>

  <div id="flashOverlay"></div>
  <div id="focusVignette"></div>

  <header>
    <div class="title-wrap">
      <span class="title-en">ROULETTE</span>
      <span class="title-jp">ルーレット</span>
    </div>
    <div id="playCounter">1ゲーム目</div>
  </header>

  <main>
    <section class="wheel-section">
      <div class="wheel-wrapper" id="wheelWrapper">
        <div class="pointer-wrap"><div class="pointer-body" id="pointerBody"></div></div>
        <canvas id="wheelCanvas" width="460" height="460"></canvas>
        <div id="glitchOverlay"><div id="scrambleText">？？</div></div>
      </div>
      <button id="btnSpin">▶ スピン！</button>
      <div id="statusDisplay"></div>
    </section>

    <section class="side-panel">
      <div class="panel-heading">PLAYERS</div>
      <div id="nameList"></div>
      <div class="add-form">
        <input id="newName" type="text" placeholder="名前を追加..." maxlength="10">
        <button id="btnAdd">＋ 追加</button>
      </div>
    </section>
  </main>

  <div id="winnerOverlay">
    <div class="winner-card" id="winnerCard">
      <div class="confetti-area" id="confettiArea"></div>
      <span class="rare-badge" id="rareBadge" style="display:none">✦ RARE ✦</span>
      <p class="winner-label-sm">WINNER</p>
      <p id="overlayName"></p>
      <button id="btnClose">CLOSE</button>
    </div>
  </div>

  <script>
    // ===== Constants =====
    const COLORS = [
      "#e83028","#e87018","#d4a800","#30a840",
      "#1888c8","#8030b8","#c02870","#18a098",
      "#b86010","#5028a8"
    ];

    const BASE_FAKE_PROB  = 0.20;   // フェイクはたまに（約5回に1回）
    const BASE_RARE_PROB  = 0.08;
    const FAKE_PROB_INC   = 0.02;   // 連続プレイでも上がりすぎない
    const RARE_PROB_INC   = 0.02;
    const MAX_FAKE_PROB   = 0.40;   // 最大でも40%まで
    const MAX_RARE_PROB   = 0.20;

    // ===== State =====
    let names       = ["尾水","荒川","豊原","八幡","半蔵","大里","池田"];
    let currentAngle = -Math.PI / 2;
    let isSpinning   = false;
    let playCount    = 0;
    let isRareRound  = false;
    let particles    = [];
    let spinSpeedFactor = 0;   // 0..1, drives effects intensity
    let rainbowHue   = 0;
    let prevDrawAngle = 0;

    // ===== DOM refs =====
    const canvas      = document.getElementById("wheelCanvas");
    const ctx         = canvas.getContext("2d");
    const glitchOvl   = document.getElementById("glitchOverlay");
    const scrambleEl  = document.getElementById("scrambleText");
    const statusEl    = document.getElementById("statusDisplay");
    const btnSpin     = document.getElementById("btnSpin");
    const pointerBody = document.getElementById("pointerBody");
    const wheelWrapper= document.getElementById("wheelWrapper");
    const focusVign   = document.getElementById("focusVignette");
    const flashOvl    = document.getElementById("flashOverlay");

    // ===== Helpers =====
    const wait    = ms => new Promise(r => setTimeout(r, ms));
    const rand    = (a, b) => a + Math.random() * (b - a);
    const randInt = (a, b) => Math.floor(a + Math.random() * (b - a + 1));
    const clamp   = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

    function calcTargetAngle(idx, revs) {
      const sliceA   = (2 * Math.PI) / names.length;
      const mid      = idx * sliceA + sliceA / 2;
      const raw      = (-Math.PI / 2 - currentAngle - mid);
      const norm     = ((raw % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
      return currentAngle + norm + revs * 2 * Math.PI;
    }

    // ホイールが止まった角度から、ポインタ位置の当選者インデックスを逆算する
    function getWinnerIndex(angle) {
      const n      = names.length;
      const sliceA = (2 * Math.PI) / n;
      // ポインタ(-π/2)からangleを引いた差分を正規化 → どのセグメントか特定
      const off = ((-Math.PI / 2 - angle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
      return Math.floor(off / sliceA) % n;
    }

    // ===== Particle System =====
    function emitParticles(cx, cy, radius) {
      if (spinSpeedFactor < 0.15) return;
      const intensity = spinSpeedFactor * (1 + playCount * 0.25);
      const count = Math.floor(intensity * 2.5);
      for (let k = 0; k < count; k++) {
        if (Math.random() > 0.45) continue;
        const a   = Math.random() * Math.PI * 2;
        const spd = rand(0.8, 3.5) * spinSpeedFactor;
        particles.push({
          x: cx + (radius - 4) * Math.cos(a),
          y: cy + (radius - 4) * Math.sin(a),
          vx: Math.cos(a) * spd + rand(-0.8, 0.8),
          vy: Math.sin(a) * spd + rand(-0.8, 0.8),
          life: 1,
          decay: rand(0.028, 0.060),
          color: isRareRound
            ? `hsl(${Math.random()*360},100%,60%)`
            : COLORS[Math.floor(Math.random() * COLORS.length)],
          size: rand(2, 4.5),
        });
      }
    }

    function drawParticles() {
      ctx.save();
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x  += p.vx; p.y  += p.vy; p.vy += 0.07;
        p.life -= p.decay;
        if (p.life <= 0) { particles.splice(i, 1); continue; }
        ctx.globalAlpha = p.life * 0.9;
        ctx.fillStyle   = p.color;
        ctx.shadowColor = p.color; ctx.shadowBlur = 7;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1; ctx.shadowBlur = 0;
      ctx.restore();
    }

    // ===== Draw Wheel =====
    function drawSegments(angle, alpha) {
      const cx = canvas.width / 2, cy = canvas.height / 2;
      const radius   = cx - 16;
      const n        = names.length;
      const sliceA   = (2 * Math.PI) / n;
      ctx.globalAlpha = alpha;
      names.forEach((name, i) => {
        const start = angle + i * sliceA;
        const end   = start + sliceA;
        const mid   = start + sliceA / 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, start, end);
        ctx.closePath();
        ctx.fillStyle = COLORS[i % COLORS.length];
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.5)";
        ctx.lineWidth = 2; ctx.stroke();
        if (alpha < 0.3) return;
        const tR = radius * 0.63;
        const tx = cx + tR * Math.cos(mid), ty = cy + tR * Math.sin(mid);
        const fs = Math.max(11, Math.min(20, Math.floor(280/n)));
        ctx.save();
        ctx.translate(tx, ty);
        ctx.rotate(mid + Math.PI / 2);
        ctx.font = `900 ${fs}px "Meiryo","Yu Gothic",sans-serif`;
        ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.shadowColor = "rgba(0,0,0,0.55)"; ctx.shadowBlur = 3;
        ctx.fillText(name, 0, 0);
        ctx.restore();
      });
      ctx.globalAlpha = 1;
    }

    function drawWheel(angle) {
      const cx = canvas.width / 2, cy = canvas.height / 2;
      const radius = cx - 16;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Motion trail when spinning fast
      if (spinSpeedFactor > 0.45) {
        const trail = spinSpeedFactor * 0.12;
        drawSegments(angle - trail * 2, 0.08);
        drawSegments(angle - trail,     0.15);
      }

      // Main segments
      drawSegments(angle, 1);

      // Outer speed glow
      if (spinSpeedFactor > 0.25) {
        ctx.beginPath();
        ctx.arc(cx, cy, radius + 1, 0, 2*Math.PI);
        const glow = clamp(spinSpeedFactor * 22, 0, 28);
        ctx.strokeStyle = isRareRound
          ? `hsla(${rainbowHue},100%,55%,0.7)`
          : "rgba(255,190,40,0.7)";
        ctx.lineWidth = 3;
        ctx.shadowColor = ctx.strokeStyle;
        ctx.shadowBlur  = glow;
        ctx.stroke();
        ctx.shadowBlur = 0;
      }

      // Rainbow rim (rare)
      if (isRareRound) {
        rainbowHue = (rainbowHue + 5) % 360;
        const steps = 60, arc = (2*Math.PI) / steps;
        for (let i = 0; i < steps; i++) {
          const hue = (rainbowHue + i*(360/steps)) % 360;
          ctx.beginPath();
          ctx.arc(cx, cy, radius + 5, i*arc, (i+1)*arc + 0.02);
          ctx.strokeStyle = `hsl(${hue},100%,52%)`;
          ctx.lineWidth = 8;
          ctx.stroke();
        }
      } else {
        // Gold rim
        ctx.beginPath(); ctx.arc(cx, cy, radius, 0, 2*Math.PI);
        ctx.strokeStyle = "#e8a010";
        ctx.lineWidth = 5;
        ctx.shadowColor = "rgba(232,160,16,0.4)"; ctx.shadowBlur = 8;
        ctx.stroke(); ctx.shadowBlur = 0;
      }

      // Outer dark ring
      ctx.beginPath(); ctx.arc(cx, cy, radius + (isRareRound ? 9 : 3), 0, 2*Math.PI);
      ctx.strokeStyle = "rgba(0,0,0,0.08)"; ctx.lineWidth = 6; ctx.stroke();

      // Center hub
      ctx.beginPath(); ctx.arc(cx, cy, 20, 0, 2*Math.PI);
      ctx.fillStyle = "#fff";
      ctx.shadowColor = "rgba(0,0,0,0.2)"; ctx.shadowBlur = 5;
      ctx.fill();
      ctx.strokeStyle = "#e8a010"; ctx.lineWidth = 3; ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.beginPath(); ctx.arc(cx, cy, 7, 0, 2*Math.PI);
      ctx.fillStyle = "#e8a010"; ctx.fill();

      // Update speed factor from angle delta
      const delta = Math.abs(angle - prevDrawAngle);
      spinSpeedFactor = clamp(delta / 0.055, 0, 1);
      prevDrawAngle = angle;

      // Pointer excited state
      pointerBody.classList.toggle("excited", spinSpeedFactor < 0.12 && isSpinning);

      emitParticles(cx, cy, radius);
      drawParticles();
    }

    // ===== Easing Functions =====
    // Full easing: fast→sustained→surge@67%→decelerate→slo-mo
    function spinEasingFull(t) {
      if (t < 0.08) return 0.10 * (t/0.08)**2;
      if (t < 0.65) return 0.10 + (t-0.08)*(0.70/0.57);
      if (t < 0.70) return 0.80 + (t-0.65)*(0.04/0.05);
      if (t < 0.85) { const s=(t-0.70)/0.15; return 0.84+(1-(1-s)**2)*0.10; }
      if (t < 0.97) return 0.94 + (t-0.85)*(0.05/0.12);
      return 0.99 + (t-0.97)*(0.01/0.03);
    }
    // Simple cubic ease-out (for fake spins)
    function easeOut3(t) { return 1-(1-t)**3; }

    // ===== Spin to Target =====
    function spinToTarget(targetIdx, { revs, duration, easing=easeOut3 }) {
      return new Promise(resolve => {
        const targetAngle = calcTargetAngle(targetIdx, revs);
        const startAngle  = currentAngle;
        const startTime   = performance.now();
        function frame(now) {
          const t  = Math.min((now-startTime)/duration, 1);
          currentAngle = startAngle + (targetAngle-startAngle) * easing(t);
          drawWheel(currentAngle);
          if (t < 1) { requestAnimationFrame(frame); }
          else {
            currentAngle = targetAngle;
            spinSpeedFactor = 0;
            drawWheel(currentAngle);
            resolve();
          }
        }
        requestAnimationFrame(frame);
      });
    }

    // ===== Wobble Phase (止まりそうで止まらない) =====
    function wobblePhase(stoppedAngle) {
      return new Promise(resolve => {
        const wobbleCount = randInt(2, 3);
        const totalDur    = 900 + wobbleCount * 120;
        const amp         = rand(0.030, 0.052);
        const startTime   = performance.now();
        function frame(now) {
          const t     = Math.min((now-startTime)/totalDur, 1);
          const decay = (1-t)**1.8;
          const osc   = Math.sin(t * wobbleCount * Math.PI * 5) * amp * decay;
          currentAngle = stoppedAngle + osc;
          spinSpeedFactor = Math.abs(osc/amp) * 0.35;
          drawWheel(currentAngle);
          if (t < 1) requestAnimationFrame(frame);
          else {
            currentAngle    = stoppedAngle;
            spinSpeedFactor = 0;
            drawWheel(currentAngle);
            resolve();
          }
        }
        requestAnimationFrame(frame);
      });
    }

    // ===== Glitch / Fake-out Phase =====
    const KANJI = "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをんアイウエオカキクケコ";
    async function glitchPhase() {
      scrambleEl.classList.remove("hazure");
      canvas.classList.add("glitching");
      glitchOvl.classList.add("active");
      statusEl.innerHTML = `<span class="status-thinking">解析中...</span>`;

      // Scramble (950ms)
      await new Promise(r => {
        const end = performance.now() + 950;
        function tick() {
          if (performance.now() < end) {
            let s = "";
            for (let i=0; i<2; i++) s += KANJI[Math.floor(Math.random()*KANJI.length)];
            scrambleEl.textContent = s;
            setTimeout(tick, 58);
          } else r();
        }
        tick();
      });

      // ハズレ (620ms)
      scrambleEl.classList.add("hazure");
      scrambleEl.textContent = "ハズレ！";
      await wait(620);

      canvas.classList.remove("glitching");
      glitchOvl.classList.remove("active");
      statusEl.innerHTML = "";
      scrambleEl.classList.remove("hazure");
      await wait(200);
    }

    // ===== Focus Effect =====
    function setFocus(on) {
      wheelWrapper.classList.toggle("pre-stop", on);
      focusVign.classList.toggle("active", on);
    }

    // ===== Screen Flash =====
    function flashScreen(color = "#ffffff", dur = 400) {
      flashOvl.style.transition = "none";
      flashOvl.style.background = color;
      flashOvl.style.opacity    = "0.88";
      requestAnimationFrame(() => {
        flashOvl.style.transition = `opacity ${dur}ms ease`;
        flashOvl.style.opacity    = "0";
      });
    }

    // ===== Main Spin Sequence =====
    async function startSpin() {
      if (isSpinning || names.length < 2) return;
      isSpinning   = true;
      playCount++;
      isRareRound  = Math.random() < clamp(BASE_RARE_PROB + playCount*RARE_PROB_INC, 0, MAX_RARE_PROB);
      rainbowHue   = Math.random() * 360;
      particles    = [];
      btnSpin.disabled = true;
      statusEl.innerHTML = "";
      document.getElementById("playCounter").textContent = `${playCount}ゲーム目`;

      const n          = names.length;
      const realWinner = Math.floor(Math.random() * n);

      // Build fake sequence (probabilistic)
      const doFakes  = Math.random() < clamp(BASE_FAKE_PROB + playCount*FAKE_PROB_INC, 0, MAX_FAKE_PROB);
      const candidates = [...Array(n).keys()].filter(i => i !== realWinner);
      for (let i = candidates.length-1; i > 0; i--) {
        const j = Math.floor(Math.random()*(i+1));
        [candidates[i],candidates[j]] = [candidates[j],candidates[i]];
      }
      const numFakes = doFakes ? Math.min(1, candidates.length) : 0; // フェイクは最大1回
      const fakes    = candidates.slice(0, numFakes);

      // Rare opening flash
      if (isRareRound) {
        flashScreen("rgba(255,210,40,0.65)", 700);
        await wait(250);
      }

      // ---- Fake spins ----
      for (let fi = 0; fi < fakes.length; fi++) {
        const isFirstFake = fi === 0;
        await spinToTarget(fakes[fi], {
          revs: isFirstFake ? rand(5,8) : rand(3,5),
          duration: isFirstFake ? rand(3400,4600) : rand(2700,3700),
          easing: easeOut3,
        });
        await wait(rand(280, 480));     // 止まって見える間
        await glitchPhase();
        await wait(140);
      }

      // ---- Final approach ----
      setFocus(true);                   // zoom in + vignette

      const finalRevs = rand(6,9) + (isRareRound ? 2 : 0) + (numFakes * 0.8);
      const finalDur  = rand(5600,7200) + (isRareRound ? 1200 : 0);
      await spinToTarget(realWinner, {
        revs: finalRevs,
        duration: finalDur,
        easing: spinEasingFull,         // full dramatic easing
      });

      // ---- Wobble ----
      const stoppedAngle = currentAngle;
      await wobblePhase(stoppedAngle);

      // ---- Suspense pause ----
      await wait(rand(300, 700));

      setFocus(false);

      // ---- Reveal ----
      if (isRareRound) {
        flashScreen("rgba(255,240,80,0.9)", 900);
        await wait(120);
      }

      isSpinning = false;
      btnSpin.disabled = false;
      // 事前決定インデックスではなく、実際に止まった角度から当選者を確定する
      announceWinner(getWinnerIndex(currentAngle));
    }

    // ===== Winner Reveal =====
    function announceWinner(idx) {
      const name = names[idx];
      statusEl.innerHTML = `<span class="winner-badge">当選：${name}</span>`;
      document.getElementById("overlayName").textContent = name;

      const card     = document.getElementById("winnerCard");
      const rareBadge= document.getElementById("rareBadge");
      card.classList.toggle("rare", isRareRound);
      rareBadge.style.display = isRareRound ? "block" : "none";

      launchConfetti();
      const ov = document.getElementById("winnerOverlay");
      ov.style.display = "flex";
      requestAnimationFrame(() => ov.classList.add("show"));
    }

    function launchConfetti() {
      const area = document.getElementById("confettiArea");
      area.innerHTML = "";
      const count = isRareRound ? 50 : 32;
      for (let i = 0; i < count; i++) {
        const el = document.createElement("span");
        el.className = "confetti-piece";
        const w = rand(5, 9), h = rand(5, 9);
        el.style.cssText = `
          left:${rand(5,95)}%;
          width:${w}px; height:${h}px;
          background:${isRareRound ? `hsl(${Math.random()*360},100%,55%)` : COLORS[i%COLORS.length]};
          border-radius:${Math.random()>0.5?'50%':'2px'};
          animation-delay:${rand(0,0.55)}s;
          animation-duration:${rand(0.7,1.2)}s;
        `;
        area.appendChild(el);
      }
    }

    document.getElementById("btnClose").addEventListener("click", () => {
      const ov = document.getElementById("winnerOverlay");
      ov.classList.remove("show");
      setTimeout(() => { ov.style.display = "none"; }, 400);
    });

    // ===== Name List =====
    function renderNameList() {
      document.getElementById("nameList").innerHTML =
        names.map((n,i) => `
          <div class="name-chip" style="border-left-color:${COLORS[i%COLORS.length]}">
            <span class="chip-num">${i+1}</span>
            <span class="chip-dot" style="background:${COLORS[i%COLORS.length]}"></span>
            <span class="chip-name">${n}</span>
            <button class="btn-remove" onclick="removeName(${i})" title="削除">✕</button>
          </div>`).join("");
      drawWheel(currentAngle);
      btnSpin.disabled = names.length < 2;
    }

    function addName() {
      const inp  = document.getElementById("newName");
      const name = inp.value.trim();
      if (!name) return;
      if (names.includes(name)) { alert("その名前は既に追加されています"); return; }
      if (names.length >= 20)   { alert("最大20名まで追加できます");         return; }
      names.push(name); inp.value = "";
      renderNameList();
    }

    function removeName(i) {
      if (names.length <= 2) { alert("最低2名必要です"); return; }
      names.splice(i, 1);
      renderNameList();
    }

    document.getElementById("btnAdd").addEventListener("click", addName);
    document.getElementById("newName").addEventListener("keydown", e => { if (e.key==="Enter") addName(); });
    document.getElementById("btnSpin").addEventListener("click", startSpin);

    // ===== Init =====
    renderNameList();
  </script>
</body>
</html>
