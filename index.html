<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ルーレット</title>
  <style>
    :root {
      --bg:      #100d0a;
      --bg2:     #1c1815;
      --bg3:     #242018;
      --accent:  #d4920a;
      --accent2: #c43a1a;
      --text:    #f0e8d0;
      --text2:   #a8998a;
      --border:  #3a3020;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ---- Grain overlay ---- */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/></filter><rect width='180' height='180' filter='url(%23n)' opacity='0.12'/></svg>");
      opacity: 0.55;
      mix-blend-mode: overlay;
    }

    body {
      font-family: "Meiryo", "Yu Gothic", "Hiragino Sans", sans-serif;
      background-color: var(--bg);
      min-height: 100vh;
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ---- Header ---- */
    header {
      padding: 28px 32px 0;
      display: flex;
      align-items: baseline;
      gap: 16px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 20px;
    }
    header .title-main {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.45em;
      color: var(--accent);
      text-transform: uppercase;
    }
    header .title-jp {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 0.08em;
      color: var(--text);
      line-height: 1;
    }
    header .title-rule {
      flex: 1;
      height: 2px;
      background: var(--border);
    }

    /* ---- Main layout ---- */
    main {
      display: flex;
      gap: 0;
      flex: 1;
      align-items: flex-start;
    }

    /* ---- Wheel Section ---- */
    .wheel-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 32px;
      gap: 24px;
      border-right: 2px solid var(--border);
    }

    .wheel-wrapper {
      position: relative;
      display: inline-block;
    }

    /* Pointer */
    .pointer-wrap {
      position: absolute;
      top: -2px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .pointer-body {
      width: 0;
      height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 34px solid var(--accent);
      filter: drop-shadow(0 3px 0 #7a5000);
    }

    /* Canvas */
    #wheelCanvas {
      display: block;
      border-radius: 50%;
      box-shadow: 6px 6px 0 #0a0806, 0 0 0 3px var(--accent), 0 0 0 8px var(--bg2), 0 0 0 10px var(--border);
    }
    #wheelCanvas.glitching {
      filter: blur(4px) saturate(2.5) contrast(1.1);
      transition: filter 0.25s;
    }

    /* Glitch overlay */
    #glitchOverlay {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at center,
        rgba(12, 8, 4, 0.5) 30%,
        rgba(200, 80, 20, 0.15) 70%,
        rgba(12, 8, 4, 0.7) 100%
      );
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      z-index: 6;
      border-radius: 50%;
      overflow: hidden;
    }
    #glitchOverlay.active {
      opacity: 1;
      animation: glitchPulse 0.12s steps(1) infinite;
    }
    @keyframes glitchPulse {
      0%   { background-position: 0 0; }
      33%  { background-position: 3px -2px; }
      66%  { background-position: -2px 3px; }
      100% { background-position: 0 0; }
    }
    #scrambleText {
      font-size: 52px;
      font-weight: 900;
      color: #ff7030;
      text-shadow:
        0 0 12px #ff7030,
        0 0 30px rgba(255, 112, 48, 0.6),
        3px 3px 0 rgba(0,0,0,0.8);
      letter-spacing: 0.15em;
      text-align: center;
      line-height: 1.3;
      transition: color 0.2s, font-size 0.2s;
    }
    #scrambleText.hazure {
      color: #ff2a2a;
      font-size: 38px;
      text-shadow:
        0 0 12px #ff2a2a,
        0 0 30px rgba(255, 42, 42, 0.7),
        2px 2px 0 rgba(0,0,0,0.8);
      letter-spacing: 0.3em;
    }

    /* Spin button */
    #btnSpin {
      background: var(--accent2);
      color: var(--text);
      border: 2px solid #8a2810;
      border-radius: 0;
      padding: 14px 56px;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0.2em;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 5px 5px 0 #6a1808;
      transition: transform 0.08s, box-shadow 0.08s;
      position: relative;
    }
    #btnSpin::before {
      content: '▶ ';
      font-size: 14px;
      opacity: 0.8;
    }
    #btnSpin:hover:not(:disabled) {
      transform: translate(-2px, -2px);
      box-shadow: 7px 7px 0 #6a1808;
    }
    #btnSpin:active:not(:disabled) {
      transform: translate(3px, 3px);
      box-shadow: 2px 2px 0 #6a1808;
    }
    #btnSpin:disabled {
      background: var(--bg3);
      border-color: var(--border);
      color: var(--text2);
      box-shadow: 3px 3px 0 #0a0806;
      cursor: not-allowed;
      transform: none;
    }
    #btnSpin:disabled::before { content: ''; }

    /* Status display */
    #status-display {
      min-height: 32px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--text2);
      text-align: center;
    }
    .winner-badge {
      display: inline-block;
      background: var(--accent);
      color: #0a0806;
      padding: 5px 20px;
      font-weight: 900;
      letter-spacing: 0.12em;
      box-shadow: 3px 3px 0 #7a5000;
    }
    .fake-badge {
      color: var(--accent2);
      letter-spacing: 0.2em;
    }

    /* ---- Side Panel ---- */
    .side-panel {
      width: 260px;
      flex-shrink: 0;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .panel-heading {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5em;
      color: var(--accent);
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }

    #name-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 400px;
      overflow-y: auto;
    }
    #name-list::-webkit-scrollbar { width: 3px; }
    #name-list::-webkit-scrollbar-thumb { background: var(--border); }

    .name-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border: 1px solid var(--border);
      background: var(--bg2);
      transition: border-color 0.15s, background 0.15s;
      cursor: default;
    }
    .name-chip:hover {
      background: var(--bg3);
      border-color: var(--accent);
    }
    .chip-num {
      font-size: 11px;
      color: var(--text2);
      font-weight: 700;
      width: 18px;
      text-align: right;
      flex-shrink: 0;
    }
    .chip-dot {
      width: 8px;
      height: 8px;
      flex-shrink: 0;
    }
    .chip-name {
      flex: 1;
      font-size: 15px;
      font-weight: 700;
    }
    .btn-remove {
      background: none;
      border: 1px solid transparent;
      width: 22px;
      height: 22px;
      color: var(--text2);
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, border-color 0.15s;
      font-family: inherit;
      flex-shrink: 0;
    }
    .btn-remove:hover {
      color: var(--accent2);
      border-color: var(--accent2);
    }

    .add-form {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #newName {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 0;
      padding: 9px 12px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    #newName::placeholder { color: var(--text2); }
    #newName:focus { border-color: var(--accent); }
    #btnAdd {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 0;
      padding: 9px;
      color: var(--text2);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.15em;
      transition: color 0.15s, border-color 0.15s;
    }
    #btnAdd:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* ---- Winner Overlay ---- */
    #winnerOverlay {
      position: fixed;
      inset: 0;
      background: rgba(8, 6, 4, 0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }
    #winnerOverlay.show {
      opacity: 1;
      pointer-events: all;
    }
    .winner-card {
      background: var(--bg2);
      border: 2px solid var(--accent);
      box-shadow: 8px 8px 0 #7a5000, 0 0 60px rgba(212, 146, 10, 0.15);
      padding: 48px 64px;
      text-align: center;
      min-width: 300px;
      animation: cardPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes cardPop {
      from { transform: scale(0.6) translateY(20px); opacity: 0; }
      to   { transform: scale(1) translateY(0);     opacity: 1; }
    }
    .confetti-area {
      position: relative;
      height: 40px;
      overflow: visible;
      margin-bottom: 16px;
    }
    .confetti-piece {
      position: absolute;
      top: 0;
      width: 7px;
      height: 7px;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg);      opacity: 1; }
      100% { transform: translateY(100px) rotate(720deg); opacity: 0; }
    }
    .winner-label-sm {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.6em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    #overlayName {
      font-size: 58px;
      font-weight: 900;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 36px;
      letter-spacing: 0.05em;
    }
    #btnClose {
      background: none;
      border: 2px solid var(--border);
      padding: 10px 40px;
      color: var(--text2);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.2em;
      box-shadow: 3px 3px 0 var(--bg);
      transition: color 0.15s, border-color 0.15s;
      border-radius: 0;
    }
    #btnClose:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    /* ---- Responsive ---- */
    @media (max-width: 700px) {
      main { flex-direction: column; }
      .wheel-section { border-right: none; border-bottom: 2px solid var(--border); }
      .side-panel { width: 100%; }
      #wheelCanvas { width: 320px; height: 320px; }
    }
  </style>
</head>
<body>

  <header>
    <div>
      <div class="title-main">ROULETTE</div>
      <div class="title-jp">ルーレット</div>
    </div>
    <div class="title-rule"></div>
  </header>

  <main>
    <section class="wheel-section">
      <div class="wheel-wrapper">
        <div class="pointer-wrap">
          <div class="pointer-body"></div>
        </div>
        <canvas id="wheelCanvas" width="460" height="460"></canvas>
        <div id="glitchOverlay">
          <div id="scrambleText">？？</div>
        </div>
      </div>
      <button id="btnSpin">スピン</button>
      <div id="status-display"></div>
    </section>

    <section class="side-panel">
      <div class="panel-heading">PLAYERS</div>
      <div id="name-list"></div>
      <div class="add-form">
        <input id="newName" type="text" placeholder="名前を追加..." maxlength="10">
        <button id="btnAdd">＋ 追加</button>
      </div>
    </section>
  </main>

  <!-- Winner Overlay -->
  <div id="winnerOverlay">
    <div class="winner-card">
      <div class="confetti-area" id="confettiArea"></div>
      <p class="winner-label-sm">WINNER</p>
      <p id="overlayName"></p>
      <button id="btnClose">CLOSE</button>
    </div>
  </div>

  <script>
    // ===== State =====
    let names = ["尾水", "荒川", "豊原", "八幡", "半蔵", "大里", "池田"];
    let currentAngle = -Math.PI / 2;
    let isSpinning = false;

    const COLORS = [
      "#c44030",  // terracotta
      "#d47820",  // amber
      "#8a9020",  // olive
      "#2a8060",  // teal
      "#4a3a90",  // indigo
      "#b04070",  // cranberry
      "#903020",  // rust
      "#3a6840",  // forest
      "#704090",  // grape
      "#2a5878",  // steel
    ];

    // ===== Canvas =====
    const canvas  = document.getElementById("wheelCanvas");
    const ctx     = canvas.getContext("2d");

    function drawWheel(angle) {
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      const radius = cx - 14;
      const n = names.length;
      const sliceAngle = (2 * Math.PI) / n;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Shadow behind wheel
      ctx.save();
      ctx.shadowColor = "rgba(0,0,0,0.6)";
      ctx.shadowBlur = 0;
      ctx.shadowOffsetX = 6;
      ctx.shadowOffsetY = 6;
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, 2 * Math.PI);
      ctx.fillStyle = "#000";
      ctx.fill();
      ctx.restore();

      names.forEach((name, i) => {
        const start = angle + i * sliceAngle;
        const end   = start + sliceAngle;
        const mid   = start + sliceAngle / 2;

        // Segment
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, start, end);
        ctx.closePath();
        ctx.fillStyle = COLORS[i % COLORS.length];
        ctx.fill();

        // Separator lines
        ctx.strokeStyle = "rgba(0,0,0,0.35)";
        ctx.lineWidth = 2;
        ctx.stroke();

        // Inner lighter stripe for depth
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius * 0.96, start + 0.01, end - 0.01);
        ctx.closePath();
        ctx.strokeStyle = "rgba(255,255,255,0.08)";
        ctx.lineWidth = 1;
        ctx.stroke();

        // Text
        const textR = radius * 0.63;
        const tx = cx + textR * Math.cos(mid);
        const ty = cy + textR * Math.sin(mid);
        const fontSize = Math.max(11, Math.min(21, Math.floor(290 / n)));

        ctx.save();
        ctx.translate(tx, ty);
        ctx.rotate(mid + Math.PI / 2);
        ctx.font = `900 ${fontSize}px "Meiryo", "Yu Gothic", sans-serif`;
        ctx.fillStyle = "rgba(255,255,255,0.95)";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.shadowColor = "rgba(0,0,0,0.7)";
        ctx.shadowBlur = 4;
        ctx.shadowOffsetX = 1;
        ctx.shadowOffsetY = 1;
        ctx.fillText(name, 0, 0);
        ctx.restore();
      });

      // Gold outer ring
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, 2 * Math.PI);
      ctx.strokeStyle = "#d4920a";
      ctx.lineWidth = 5;
      ctx.shadowColor = "transparent";
      ctx.stroke();

      // Dark outer rim
      ctx.beginPath();
      ctx.arc(cx, cy, radius + 3, 0, 2 * Math.PI);
      ctx.strokeStyle = "rgba(0,0,0,0.5)";
      ctx.lineWidth = 6;
      ctx.stroke();

      // Center hub
      ctx.beginPath();
      ctx.arc(cx, cy, 18, 0, 2 * Math.PI);
      ctx.fillStyle = "#1c1815";
      ctx.shadowColor = "transparent";
      ctx.fill();
      ctx.strokeStyle = "#d4920a";
      ctx.lineWidth = 3;
      ctx.stroke();

      // Hub dot
      ctx.beginPath();
      ctx.arc(cx, cy, 5, 0, 2 * Math.PI);
      ctx.fillStyle = "#d4920a";
      ctx.fill();
    }

    // ===== Helpers =====
    function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

    function calcTargetAngle(targetIndex, extraRevs) {
      const sliceAngle = (2 * Math.PI) / names.length;
      const targetMid  = targetIndex * sliceAngle + sliceAngle / 2;
      const rawDelta   = (-Math.PI / 2 - currentAngle - targetMid);
      const normDelta  = ((rawDelta % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
      return currentAngle + normDelta + extraRevs * 2 * Math.PI;
    }

    function easeOut3(t) { return 1 - Math.pow(1 - t, 3); }
    function easeInOut(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }

    function spinToTarget(targetIndex, { revs, duration, easing = easeOut3 }) {
      return new Promise(resolve => {
        const targetAngle = calcTargetAngle(targetIndex, revs);
        const startAngle  = currentAngle;
        const startTime   = performance.now();

        function frame(now) {
          const t = Math.min((now - startTime) / duration, 1);
          currentAngle = startAngle + (targetAngle - startAngle) * easing(t);
          drawWheel(currentAngle);
          if (t < 1) { requestAnimationFrame(frame); }
          else {
            currentAngle = targetAngle;
            drawWheel(currentAngle);
            resolve();
          }
        }
        requestAnimationFrame(frame);
      });
    }

    // ===== Glitch / Fake-out =====
    const KANJI_POOL = "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをんアイウエオカキクケコ";

    async function glitchPhase() {
      const overlay     = document.getElementById("glitchOverlay");
      const scrambleEl  = document.getElementById("scrambleText");
      const statusEl    = document.getElementById("status-display");

      scrambleEl.classList.remove("hazure");
      scrambleEl.style.fontSize = "52px";
      canvas.classList.add("glitching");
      overlay.classList.add("active");
      statusEl.innerHTML = `<span class="fake-badge">読み込み中...</span>`;

      // Scramble phase (1100ms)
      await new Promise(resolve => {
        const start = performance.now();
        const len = 2;
        function tick() {
          const elapsed = performance.now() - start;
          if (elapsed < 1100) {
            let txt = "";
            for (let i = 0; i < len; i++) {
              txt += KANJI_POOL[Math.floor(Math.random() * KANJI_POOL.length)];
            }
            scrambleEl.textContent = txt;
            setTimeout(tick, 55);
          } else { resolve(); }
        }
        tick();
      });

      // ハズレ! phase (700ms)
      scrambleEl.classList.add("hazure");
      scrambleEl.textContent = "ハズレ！";
      await wait(700);

      // Fade out
      canvas.classList.remove("glitching");
      overlay.classList.remove("active");
      statusEl.innerHTML = "";
      await wait(250);
    }

    // ===== Main Spin Sequence =====
    async function startSpin() {
      if (isSpinning || names.length < 2) return;
      isSpinning = true;
      document.getElementById("btnSpin").disabled = true;
      document.getElementById("status-display").innerHTML = "";

      const n = names.length;
      const realWinner = Math.floor(Math.random() * n);

      // Pick fake stops (distinct from real winner)
      const candidates = [...Array(n).keys()].filter(i => i !== realWinner);
      for (let i = candidates.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
      }
      const numFakes = Math.min(2, candidates.length);
      const fakes = candidates.slice(0, numFakes);

      // Phase 1-N: Fake stops
      const fakeRevs     = [6 + Math.random() * 4, 4 + Math.random() * 3];
      const fakeDurations = [3800 + Math.random() * 1200, 3200 + Math.random() * 1000];

      for (let i = 0; i < fakes.length; i++) {
        await spinToTarget(fakes[i], {
          revs: fakeRevs[i],
          duration: fakeDurations[i],
          easing: easeOut3
        });
        await wait(350);         // 止まって見える間
        await glitchPhase();
        await wait(150);
      }

      // Final: Real spin (re-acceleration feel: easeInOut)
      await spinToTarget(realWinner, {
        revs: 7 + Math.random() * 5,
        duration: 5500 + Math.random() * 1500,
        easing: easeOut3
      });

      isSpinning = false;
      document.getElementById("btnSpin").disabled = false;
      announceWinner(realWinner);
    }

    // ===== Winner =====
    function announceWinner(index) {
      const name = names[index];

      document.getElementById("status-display").innerHTML =
        `<span class="winner-badge">当選：${name}</span>`;

      document.getElementById("overlayName").textContent = name;
      launchConfetti();
      const ov = document.getElementById("winnerOverlay");
      ov.style.display = "flex";
      requestAnimationFrame(() => ov.classList.add("show"));
    }

    function launchConfetti() {
      const area = document.getElementById("confettiArea");
      area.innerHTML = "";
      for (let i = 0; i < 36; i++) {
        const el = document.createElement("span");
        el.className = "confetti-piece";
        el.style.left   = `${Math.random() * 100}%`;
        el.style.background = COLORS[i % COLORS.length];
        el.style.width  = `${5 + Math.random() * 6}px`;
        el.style.height = `${5 + Math.random() * 6}px`;
        el.style.animationDelay    = `${Math.random() * 0.5}s`;
        el.style.animationDuration = `${0.8 + Math.random() * 0.8}s`;
        area.appendChild(el);
      }
    }

    document.getElementById("btnClose").addEventListener("click", () => {
      const ov = document.getElementById("winnerOverlay");
      ov.classList.remove("show");
      setTimeout(() => { ov.style.display = "none"; }, 400);
    });

    // ===== Name List =====
    function renderNameList() {
      const container = document.getElementById("name-list");
      container.innerHTML = names.map((name, i) => `
        <div class="name-chip">
          <span class="chip-num">${i + 1}</span>
          <span class="chip-dot" style="background:${COLORS[i % COLORS.length]}"></span>
          <span class="chip-name">${name}</span>
          <button class="btn-remove" onclick="removeName(${i})" title="削除">✕</button>
        </div>
      `).join("");
      drawWheel(currentAngle);
      document.getElementById("btnSpin").disabled = names.length < 2;
    }

    function addName() {
      const input = document.getElementById("newName");
      const name  = input.value.trim();
      if (!name) return;
      if (names.includes(name)) { alert("その名前は既に追加されています"); return; }
      if (names.length >= 20)   { alert("最大20名まで追加できます"); return; }
      names.push(name);
      input.value = "";
      renderNameList();
    }

    function removeName(index) {
      if (names.length <= 2) { alert("最低2名必要です"); return; }
      names.splice(index, 1);
      renderNameList();
    }

    document.getElementById("btnAdd").addEventListener("click", addName);
    document.getElementById("newName").addEventListener("keydown", e => {
      if (e.key === "Enter") addName();
    });
    document.getElementById("btnSpin").addEventListener("click", startSpin);

    // ===== Init =====
    renderNameList();
  </script>
</body>
</html>
